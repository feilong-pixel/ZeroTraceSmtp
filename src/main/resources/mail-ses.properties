# Amazon SES SMTP 服务器地址 (如东京区域: email-smtp.ap-northeast-1.amazonaws.com)
mail.smtp.host=email-smtp.ap-northeast-1.amazonaws.com

# SMTP 服务端口号 (通常 STARTTLS 为 587 或 25，直接 SSL 为 465)
mail.smtp.port=587

# AWS SES SMTP 认证用户名 (注意：这不同于您的 AWS Access Key)
mail.smtp.username=YOUR_SES_SMTP_USERNAME

# AWS SES SMTP 认证密码 (注意：这不同于您的 AWS Secret Access Key)
mail.smtp.password=YOUR_SES_SMTP_PASSWORD

# 是否启用 STARTTLS 加密 (SES 推荐在 587 端口启用 STARTTLS 升级连接安全性)
mail.smtp.starttls.enable=true

# 是否启用直接 SSL 加密 (如果端口为 465，请将此项设为 true，且 starttls.enable 设为 false)
mail.smtp.ssl.enable=false

# 发件人显示别名名称
mail.smtp.sender.name=Your Name

# 发送者邮箱地址 (必须是在 AWS SES 控制台中通过验证 (Verified) 的发件人身份或域)
mail.smtp.sender.email=verified@example.com

# 连接超时时间，单位：毫秒 (默认 5000 毫秒)
mail.smtp.connectiontimeout=5000

# 读取超时时间，单位：毫秒 (默认 5000 毫秒)
mail.smtp.timeout=5000

# 写入超时时间，单位：毫秒 (默认 5000 毫秒)
mail.smtp.writetimeout=5000

# 是否启用 javax.mail 底层协议级别的调试模式 (建议生产环境关闭，设为 false)
mail.debug=false

# SMTP 连接调试拦截标志：0表示开启拦截（模拟连接与发送，不访问网络），1表示关闭拦截（真实建立连接并向 SES 发送邮件）
mail.smtp.debug.flag=0
